 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Jinka Player</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --accent:#e8607a;
  --bg:#08080f;
  --glass:#08080f;
  --glass2:rgba(255,255,255,0.07);
  --bdr:rgba(255,255,255,0.08);
  --txt:#f0ecff;
  --txt2:rgba(240,236,255,0.45);
  --txt3:rgba(240,236,255,0.22);
  --rad:28px;
}

html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:'Outfit',sans-serif;font-weight:300;}

/* GRAIN */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.88' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");background-size:160px;pointer-events:none;z-index:9999;mix-blend-mode:overlay;opacity:.55;}

/* BG */
#bg-wrap{position:fixed;inset:0;z-index:0;overflow:hidden;}
.sphere{position:absolute;border-radius:50%;filter:blur(80px);opacity:.22;transition:background 1.6s ease, opacity 1.2s ease;}
#sp1{width:80vw;height:80vw;top:-30%;left:-20%;background:var(--accent);}
#sp2{width:60vw;height:60vw;bottom:-20%;right:-20%;background:#6040b0;opacity:.12;}
#bg-img{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
  filter:blur(55px) saturate(1.3) brightness(.18);
  transform:scale(1.15);
  transition:background-image 1.4s ease,opacity 1s;
  opacity:0;
  will-change:opacity;
}
#bg-img.on{opacity:1;}


/* ── RESPECT SYSTEM REDUCE MOTION ── */
@media (prefers-reduced-motion: reduce) {
  .sphere{transition:none!important;}
  #bg-img{transition:opacity 1s!important;}
  .art-glow{animation:none!important;opacity:0!important;}
  .eye-card{transition:none!important;}
}


/* ═══════════════════════════════════
   LEAF SHOWER — glowing gradient leaves
   ═══════════════════════════════════ */
#flower-canvas{
  position:fixed;inset:0;z-index:1;
  pointer-events:none;overflow:hidden;
  opacity:1;
  transition:opacity 1.8s ease;
}
.petal{
  position:absolute;
  top:-60px;
  opacity:0;
  will-change:transform,opacity;
  animation:leafFall linear infinite;
  filter:blur(2px) drop-shadow(0 3px 7px var(--glow-color, rgba(100,200,255,0.2)));
  pointer-events:none;
  user-select:none;
}

/* FLOWERS - Blurry SVG style */
.flower{
  position:absolute;
  top:-60px;
  opacity:0;
  will-change:transform,opacity;
  animation:leafFall linear infinite;
  filter:blur(0.5px);
  pointer-events:none;
  user-select:none;
}

/* Glowing leaf shapes - all rounded, no edges */
.petal-shape{
  position:relative;
  display:block;
  filter:brightness(1.15);
  border-radius:50%;
}

/* Leaf type 1: Small rounded blob */
.petal-shape.t1{
  width:14px;height:18px;
  background:var(--leaf-gradient);
  border-radius:50%;
  opacity:.65;
  box-shadow:0 0 6px var(--glow-color, rgba(100,200,255,0.25));
}

/* Leaf type 2: Oval rounded */
.petal-shape.t2{
  width:16px;height:22px;
  background:var(--leaf-gradient);
  border-radius:50%;
  opacity:.6;
  box-shadow:0 0 7px var(--glow-color, rgba(100,200,255,0.3));
}

/* Leaf type 3: Small round */
.petal-shape.t3{
  width:12px;height:14px;
  background:var(--leaf-gradient);
  border-radius:50%;
  opacity:.55;
  box-shadow:0 0 5px var(--glow-color, rgba(100,200,255,0.25));
}

/* Leaf type 4: Medium rounded */
.petal-shape.t4{
  width:18px;height:24px;
  background:var(--leaf-gradient);
  border-radius:50%;
  opacity:.6;
  box-shadow:0 0 7px var(--glow-color, rgba(100,200,255,0.28));
}

/* Leaf type 5: Tiny glow */
.petal-shape.t5{
  width:10px;height:12px;
  background:var(--leaf-gradient);
  border-radius:50%;
  opacity:.5;
  box-shadow:0 0 5px var(--glow-color, rgba(100,200,255,0.2));
}

@keyframes leafFall{
  0%{
    opacity:0;
    transform:translateY(0) translateX(0) rotate(0deg) scale(0.7);
  }
  8%{
    opacity:var(--popacity,0.65);
  }
  50%{
    transform:translateY(calc(50vh)) translateX(var(--drift,30px)) rotate(var(--spin,180deg)) scale(1);
  }
  92%{
    opacity:var(--popacity,0.65);
  }
  100%{
    opacity:0;
    transform:translateY(calc(105vh + 60px)) translateX(var(--drift2,-20px)) rotate(var(--spin2,360deg)) scale(0.8);
  }
}

/* secondary sway */
@keyframes sway{
  0%,100%{transform:translateX(0);}
  25%{transform:translateX(12px);}
  75%{transform:translateX(-10px);}
}

/* LAYOUT */
#app{
  position:relative;z-index:2;
  height:100vh;max-width:440px;margin:0 auto;
  display:flex;flex-direction:column;
  padding:22px 22px 0;
}

/* PLAYER SECTION */
.player-sec{
  flex:1;min-height:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;
  /* reserve space so content never hides behind the bottom dock */
  padding-bottom:178px;
}

/* ART */
.art-wrap{
  position:relative;
  width:min(72%,280px);aspect-ratio:1;
  margin-bottom:clamp(16px,3.5vh,28px);flex-shrink:0;
}
.art-img{
  width:100%;height:100%;object-fit:cover;
  border-radius:var(--rad);position:relative;z-index:2;
  box-shadow:0 24px 64px rgba(0,0,0,0.65);display:block;
  transition:transform .5s cubic-bezier(.16,1,.3,1);
}
.art-glow{
  position:absolute;inset:-10px;border-radius:40px;
  background:var(--accent);filter:blur(32px);
  opacity:0;z-index:1;transition:opacity 1s;
  will-change:opacity,transform;
}
.playing .art-glow{animation:breathe 4s ease-in-out infinite;}
@keyframes breathe{0%,100%{opacity:.18;transform:scale(.94);}50%{opacity:.42;transform:scale(1.06);}}

.like-btn{
  position:absolute;top:12px;right:12px;z-index:3;
  width:34px;height:34px;border-radius:50%;
  background:rgba(0,0,0,0.45);border:1px solid rgba(255,255,255,0.1);
  color:#fff;font-size:.95rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,transform .2s;backdrop-filter:blur(8px);
}
.like-btn:hover{transform:scale(1.12);}
.like-btn.on{color:var(--accent);}

/* INFO */
.song-info{width:100%;margin-bottom:clamp(10px,2vh,20px);}
.now-label{font-size:.58rem;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);opacity:.6;margin-bottom:5px;}
.playing .now-label{opacity:1;}
.song-title{
  font-family:'Instrument Serif',serif;
  font-size:clamp(1.6rem,5.5vw,2.4rem);line-height:1.05;color:var(--txt);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;
}
.song-artist{font-size:.82rem;color:var(--txt2);margin-top:5px;letter-spacing:.02em;}

/* WAVEFORM PROGRESS */
.wave-area{width:100%;margin-bottom:clamp(10px,2vh,18px);}
.wave-box{
  display:flex;align-items:flex-end;gap:2.5px;
  height:38px;cursor:pointer;user-select:none;margin-bottom:7px;
}
.wb{
  flex:1;border-radius:2px;
  background:rgba(255,255,255,0.09);
  transition:background .22s;
}
.wb.played{background:var(--accent);}
.wb.head{
  background:#fff;
  box-shadow:0 0 7px rgba(255,255,255,0.55);
}
.time-row{display:flex;justify-content:space-between;font-size:.6rem;color:var(--txt2);letter-spacing:.04em;}

/* CONTROLS */
.controls{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  width:100%;gap:4px;
}
.ctrl-left{display:flex;align-items:center;justify-content:flex-start;gap:2px;}
.ctrl-center{display:flex;align-items:center;justify-content:center;gap:6px;}
.ctrl-right{display:flex;align-items:center;justify-content:flex-end;gap:2px;}
.icon-btn{
  width:42px;height:42px;border-radius:50%;
  background:transparent;border:none;color:var(--txt2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:color .18s,background .18s,transform .15s;flex-shrink:0;
  position:relative;
}
.icon-btn svg{width:20px;height:20px;fill:currentColor;}
.icon-btn:hover{color:var(--txt);background:var(--glass2);}
.icon-btn.on{color:var(--accent);}
.icon-btn:active{transform:scale(.9);}

/* Loading indicator for preload status */
.icon-btn .load-ring{
  position:absolute;width:18px;height:18px;border:1.5px solid transparent;
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .8s linear infinite;opacity:0;
  pointer-events:none;transition:opacity .2s;
}
.icon-btn.loading .load-ring{opacity:1;}
@keyframes spin{to{transform:rotate(360deg);}}

.play-btn{
  width:64px;height:64px;border-radius:50%;
  background:#fff;border:none;color:#080810;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
  box-shadow:0 8px 28px rgba(255,255,255,0.2);
  transition:transform .15s,box-shadow .2s;
  position:relative;
}
.play-btn svg{width:24px;height:24px;fill:#080810;}
.play-btn:hover{transform:scale(1.07);box-shadow:0 12px 36px rgba(255,255,255,0.26);}
.play-btn:active{transform:scale(.94);}

/* UP NEXT */
.up-next{
  background:var(--glass);border:1px solid var(--bdr);
  border-radius:24px;
  overflow:hidden;flex-shrink:0;
  /* NO max-height here — only track-list collapses, so header never vanishes */
}
.up-next.expanded{
  /* expanded state handled by track-list below */
}

/* EYE PIC WIDGET — card strip */
.eye-pic-wrap{
  width:100%;
  border-radius:18px;
  position:relative;
  height:110px;
  border:1.5px solid rgba(232,96,122,0.35);
  box-shadow:0 8px 32px rgba(232,96,122,0.12), inset 0 1px 0 rgba(255,255,255,0.07);
  transition:border-color .9s ease, box-shadow .9s ease;
  background:#0a0a14;
  overflow:hidden;
  padding:10px 10px 8px;
}

/* label row */
.eye-pic-label{
  font-size:.52rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--accent);opacity:.65;margin-bottom:8px;padding:0 2px;
  display:flex;align-items:center;gap:5px;
}
.eye-pic-label::after{
  content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(232,96,122,0.25),transparent);
}

/* scrollable card row */
.eye-pic-strip{
  display:flex;gap:8px;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  scrollbar-width:none;
  padding-bottom:4px;
  -webkit-overflow-scrolling:touch;
  height:80px;
  justify-content:center;
  align-items:center;
}
.eye-pic-strip::-webkit-scrollbar{display:none;}

/* individual photo card */
.eye-card{
  flex-shrink:0;
  width:70px;
  height:70px;
  border-radius:13px;
  background-size:cover;background-position:center;
  scroll-snap-align:start;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  border:0.5px solid rgba(255,255,255,0.07);
  transition:transform .22s cubic-bezier(.16,1,.3,1), border-color .3s, box-shadow .3s;
  will-change:transform;
}
.eye-card::after{
  content:'';position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(180deg,transparent 45%,rgba(0,0,0,0.48) 100%);
  pointer-events:none;
}
.eye-card.active-card{
  border-color:var(--accent);
  box-shadow:0 0 0 1px var(--accent), 0 8px 20px rgba(232,96,122,0.35);
  transform:scale(1.05);
}
.eye-card:active{transform:scale(.96);}

/* tiny heart badge on active */
.eye-card-badge{
  position:absolute;top:5px;right:6px;z-index:3;
  font-size:.65rem;opacity:0;
  transition:opacity .3s;
}
.eye-card.active-card .eye-card-badge{opacity:1;}

/* dot indicators */
.eye-pic-dots{
  display:flex;justify-content:center;gap:5px;margin-top:8px;
}
.eye-dot{
  width:5px;height:5px;border-radius:50%;
  background:rgba(255,255,255,0.15);
  transition:background .35s, transform .35s, width .35s;
}
.eye-dot.on{
  background:var(--accent);
  width:16px;border-radius:99px;
}

/* ── LIGHTBOX ── */
#eye-lightbox{
  position:fixed;inset:0;z-index:5000;
  display:flex;align-items:center;justify-content:center;
  background:rgba(4,4,10,0.0);
  backdrop-filter:blur(0px);
  transition:background .42s ease, backdrop-filter .42s ease;
  pointer-events:none;
  overflow:hidden;
}
#eye-lightbox.open{
  background:rgba(4,4,10,0.88);
  backdrop-filter:blur(22px);
  pointer-events:auto;
}
.lb-inner{
  display:flex;flex-direction:column;align-items:center;
  gap:0;width:min(88vw,360px);
  transform:scale(.84) translateY(40px);opacity:0;
  transition:transform .44s cubic-bezier(.16,1,.3,1), opacity .44s ease;
}
#eye-lightbox.open .lb-inner{transform:scale(1) translateY(0);opacity:1;}
.lb-img{
  width:100%;aspect-ratio:1;
  border-radius:22px;
  object-fit:cover;
  box-shadow:0 24px 72px rgba(0,0,0,0.7), 0 0 0 1.5px rgba(255,255,255,0.08);
  display:block;
}
.lb-caption{
  margin-top:20px;text-align:center;
  padding:0 10px;
}
.lb-cap-main{
  font-family:'Instrument Serif',serif;
  font-size:clamp(1.3rem,5vw,1.75rem);
  font-style:italic;
  color:var(--txt);
  line-height:1.25;
}
.lb-cap-sub{
  font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--accent);margin-top:8px;opacity:.7;
}
.lb-nav{
  display:flex;align-items:center;gap:18px;margin-top:22px;
}
.lb-nav-btn{
  width:40px;height:40px;border-radius:50%;
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);
  color:var(--txt2);font-size:1.1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .18s, color .18s, transform .15s;
}
.lb-nav-btn:hover{background:rgba(255,255,255,0.13);color:var(--txt);}
.lb-nav-btn:active{transform:scale(.88);}
.lb-close{
  align-self:flex-end;
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);
  color:var(--txt2);font-size:.95rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .18s;
  margin-bottom:0px;
  position:relative;
  top:-30px;
}
.lb-close:hover{background:rgba(255,255,255,0.15);color:var(--txt);}
.lb-counter{
  font-size:.62rem;letter-spacing:.1em;color:var(--txt3);
  font-variant-numeric:tabular-nums;
}

/* ANIMATED CAT */
.up-next-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;
  cursor:pointer;
  user-select:none;
  touch-action:none;
}

.sec-label{
  font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--txt2);
  flex:1;
}

.up-next-expand{
  width:32px;height:32px;border-radius:50%;
  background:var(--glass2);border:1px solid var(--bdr);
  color:var(--txt2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .18s,color .18s,transform .3s;flex-shrink:0;
  border:none;
  padding:0;
  pointer-events:auto;
  position:relative;
  z-index:10;
}
.up-next-expand svg{width:15px;height:15px;fill:currentColor;transition:transform .3s;}
.up-next-expand:hover{background:rgba(255,255,255,0.1);color:var(--txt);}
.up-next.expanded .up-next-expand svg{transform:rotate(180deg);}

.track-list{
  padding:0 10px;
  max-height:0;
  overflow:hidden;
  scrollbar-width:thin;
  scrollbar-color:var(--bdr) transparent;
  transition:max-height .4s cubic-bezier(.16,1,.3,1), padding .35s cubic-bezier(.16,1,.3,1);
}
.up-next.expanded .track-list{
  max-height:calc(55vh - 60px);
  overflow-y:auto;
  padding:8px 10px 10px;
}
.track-list::-webkit-scrollbar{width:3px;}
.track-list::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:99px;}

.track-row{
  display:flex;align-items:center;gap:13px;
  padding:10px 8px;border-radius:14px;cursor:pointer;
  transition:background .18s;
  min-height:64px;
  position:relative;
}
.track-row:active{transform:scale(.98);}
.track-row:hover{background:var(--glass2);}
.track-row.act{
  background:rgba(232,96,122,0.09);
  border:1px solid rgba(232,96,122,0.22);
}
/* Row number badge */
.track-num{
  font-size:.65rem;color:var(--txt3);
  width:18px;text-align:center;flex-shrink:0;
  font-variant-numeric:tabular-nums;
}
.track-row.act .track-num{display:none;}

/* Preload status indicator */
.track-preload{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  width:16px;height:16px;border-radius:50%;
  background:transparent;border:1.5px solid var(--txt3);
  opacity:0;transition:opacity .2s;
  font-size:.55rem;display:flex;align-items:center;justify-content:center;
  color:var(--txt3);
}
.track-row.preloading .track-preload{opacity:1;}
.track-row.preloading .track-preload::before{
  content:'⟳';animation:spin .8s linear infinite;
}
.track-row.preloaded .track-preload{opacity:0.6;border-color:var(--accent);color:var(--accent);}
.track-row.preloaded .track-preload::before{content:'✓';}

.track-thumb{
  width:52px;height:52px;border-radius:12px;
  object-fit:cover;flex-shrink:0;
  border:1px solid var(--bdr);
  transition:transform .2s;
}
.track-row:hover .track-thumb{transform:scale(1.04);}
.track-row.act .track-thumb{
  box-shadow:0 0 0 2px var(--accent);
}

.track-meta{flex:1;min-width:0;}
.track-title{
  font-size:.84rem;font-weight:400;color:var(--txt);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  line-height:1.3;
}
.track-row.act .track-title{color:var(--accent);}
.track-artist{
  font-size:.68rem;color:var(--txt2);margin-top:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

.track-wave{
  display:flex;align-items:center;gap:2.5px;
  height:18px;flex-shrink:0;opacity:0;
  transition:opacity .2s;
}
.track-row.act .track-wave{opacity:1;}
.tw{width:3px;border-radius:2px;background:var(--accent);animation:wavebar .75s ease-in-out infinite;}
.tw:nth-child(1){height:35%;animation-delay:0s;}
.tw:nth-child(2){height:80%;animation-delay:.1s;}
.tw:nth-child(3){height:55%;animation-delay:.2s;}
.tw:nth-child(4){height:90%;animation-delay:.05s;}
@keyframes wavebar{0%,100%{transform:scaleY(.3);}50%{transform:scaleY(1);}}

/* BOTTOM DOCK — absolutely pinned so expanding up-next never shifts the player */
.bottom-dock{
  position:absolute;
  bottom:0;left:0;right:0;
  padding:0 22px 18px;
  display:flex;flex-direction:column;gap:12px;
  pointer-events:none;z-index:5;
}
.bottom-dock>*{pointer-events:auto;}

/* LYRICS PANEL */
#lyrics-panel{
  position:fixed;inset:0;z-index:200;
  background:rgba(6,6,12,0.97);backdrop-filter:blur(28px);
  display:flex;flex-direction:column;align-items:center;
  transform:translateY(100%);
  transition:transform .48s cubic-bezier(.16,1,.3,1);
  overflow:hidden;
}
#lyrics-panel.open{transform:translateY(0);}

.lyr-handle{width:38px;height:4px;border-radius:99px;background:rgba(255,255,255,0.15);margin:14px auto 0;flex-shrink:0;}

.lyr-header{
  width:100%;max-width:440px;padding:14px 22px 0;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
.lyr-track{
  font-family:'Instrument Serif',serif;font-size:1rem;
  color:var(--txt2);font-style:italic;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px;
}
.lyr-close{
  width:34px;height:34px;border-radius:50%;
  background:var(--glass2);border:1px solid var(--bdr);
  color:var(--txt2);font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .18s;flex-shrink:0;
}

/* lyr-body scrolls */

   LOADING SCREEN
   ═══════════════════════════════════ */
#loading-screen{
  position:fixed;inset:0;z-index:10000;
  background:#08080f;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .9s cubic-bezier(.4,0,.2,1), transform .9s cubic-bezier(.4,0,.2,1);
  overflow:hidden;
}
#loading-screen.fade-out{
  opacity:0;pointer-events:none;transform:scale(1.05);
}
.ls-orb1{

  position:absolute;width:65vw;height:65vw;border-radius:50%;

@keyframes lsFloat1{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(18px,-28px) scale(1.05);}}

/* spinning vinyl disc */
.ls-vinyl-wrap{position:relative;width:100px;height:100px;margin-bottom:4px;}

</style>

<script>
/* ═══════════════════════════════════════════
   FLOWER SHOWER ENGINE
═══════════════════════════════════════════ */    
const leafShowerAPI = (function leafShower(){
  const canvas = document.getElementById('flower-canvas');
  const MAX_LEAVES = 12;
  const MAX_FLOWERS = 8;
  const SPAWN_INTERVAL = 100;
  const FLOWER_SPAWN_INTERVAL = 600;

  let _started = false;

  // Spawn interval refs so we can restart them
  let _leafInterval   = null;
  let _flowerInterval = null;

  // Random color gradients - pink, yellow, green, blue
  const COLOR_GRADIENTS = [
    'linear-gradient(135deg, #ff69b4 0%, #ff1493 100%)',      // Hot pink
    'linear-gradient(135deg, #ffb347 0%, #ffa500 100%)',      // Yellow/Orange
    'linear-gradient(135deg, #00ff88 0%, #00dd66 100%)',      // Green
    'linear-gradient(135deg, #87ceeb 0%, #4169e1 100%)',      // Sky blue
    'linear-gradient(135deg, #ff69b4 0%, #ffb347 100%)',      // Pink to yellow
    'linear-gradient(135deg, #00ff88 0%, #87ceeb 100%)',      // Green to blue
    'linear-gradient(135deg, #ffa500 0%, #ff1493 100%)',      // Orange to pink
    'linear-gradient(135deg, #4169e1 0%, #00ff88 100%)',      // Blue to green
    'linear-gradient(135deg, #ff69b4 0%, #87ceeb 100%)',      // Pink to blue
    'linear-gradient(135deg, #ffb347 0%, #00ff88 100%)',      // Yellow to green
  ];

  const GLOW_COLORS = [
    'rgba(255, 105, 180, 0.5)',     // Pink glow
    'rgba(255, 165, 0, 0.5)',       // Yellow glow
    'rgba(0, 255, 136, 0.5)',       // Green glow
    'rgba(65, 105, 225, 0.5)',      // Blue glow
  ];

  const FLOWER_COLORS = [
    '#ff69b4', // Hot pink
    '#ff1493', // Deep pink
    '#ffb347', // Yellow
    '#ffa500', // Orange
    '#ff69b4', // Pink
    '#ff6b9d', // Light pink
    '#ffc0cb', // Pale pink
    '#ffe5b4', // Peach
  ];

  let leafCount = 0;
  let flowerCount = 0;

  const TYPES = ['t1','t2','t3','t4','t5'];

  function randomBetween(a,b){ return a + Math.random()*(b-a); }

  // Create SVG flower
  function createSVGFlower(color) {
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('viewBox', '0 0 100 100');
    svg.setAttribute('width', '32');
    svg.setAttribute('height', '32');
    
    // Create 5 petals
    for(let i = 0; i < 5; i++) {
      const angle = (i * 72) * (Math.PI / 180);
      const x = 50 + 30 * Math.cos(angle);
      const y = 50 + 30 * Math.sin(angle);
      
      const petal = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
      petal.setAttribute('cx', x);
      petal.setAttribute('cy', y);
      petal.setAttribute('rx', '16');
      petal.setAttribute('ry', '20');
      petal.setAttribute('fill', color);
      petal.setAttribute('opacity', '0.85');
      petal.setAttribute('transform', `rotate(${i * 72} 50 50)`);
      svg.appendChild(petal);
    }
    
    // Center circle
    const center = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    center.setAttribute('cx', '50');
    center.setAttribute('cy', '50');
    center.setAttribute('r', '12');
    center.setAttribute('fill', '#ffdd00');
    center.setAttribute('opacity', '0.9');
    svg.appendChild(center);
    
    return svg;
  }

  function spawnLeaf(){
    if(leafCount >= MAX_LEAVES) return;

    const el = document.createElement('div');
    el.className = 'petal';

    const type = TYPES[Math.floor(Math.random()*TYPES.length)];
    const gradient = COLOR_GRADIENTS[Math.floor(Math.random()*COLOR_GRADIENTS.length)];
    const glowColor = GLOW_COLORS[Math.floor(Math.random()*GLOW_COLORS.length)];
    const size = randomBetween(0.5, 1.0);
    const duration = randomBetween(10, 22);
    const delay = randomBetween(0, 2);
    const left = randomBetween(-5, 105);
    const drift1 = randomBetween(-60, 60);
    const drift2 = randomBetween(-40, 40);
    const spin1 = randomBetween(90, 450) * (Math.random()>0.5?1:-1);
    const spin2 = randomBetween(180, 720) * (Math.random()>0.5?1:-1);
    const opacity = randomBetween(0.4, 0.7);

    el.style.left = left + '%';
    el.style.setProperty('--drift',  drift1 + 'px');
    el.style.setProperty('--drift2', drift2 + 'px');
    el.style.setProperty('--spin',   spin1 + 'deg');
    el.style.setProperty('--spin2',  spin2 + 'deg');
    el.style.setProperty('--popacity', opacity);
    el.style.setProperty('--glow-color', glowColor);
    el.style.animationDuration = duration + 's';
    el.style.animationDelay = delay + 's';

    const shape = document.createElement('span');
    shape.className = 'petal-shape ' + type;
    shape.style.setProperty('--leaf-gradient', gradient);
    shape.style.transform = 'scale(' + size + ')';

    el.appendChild(shape);
    canvas.appendChild(el);
    leafCount++;

    const totalTime = (duration + delay) * 1000 + 200;
    setTimeout(()=>{
      el.remove();
      leafCount--;
    }, totalTime);
  }

  function spawnFlower(){
    if(flowerCount >= MAX_FLOWERS) return;

    const el = document.createElement('div');
    el.className = 'flower';

    const color = FLOWER_COLORS[Math.floor(Math.random()*FLOWER_COLORS.length)];
    const size = randomBetween(0.7, 1.3);
    const duration = randomBetween(12, 24);
    const delay = randomBetween(0, 2);
    const left = randomBetween(-5, 105);
    const drift1 = randomBetween(-80, 80);
    const drift2 = randomBetween(-60, 60);
    const spin1 = randomBetween(120, 180) * (Math.random()>0.5?1:-1);
    const spin2 = randomBetween(180, 220) * (Math.random()>0.5?1:-1);
    const opacity = randomBetween(0.5, 0.75);

    el.style.left = left + '%';
    el.style.setProperty('--drift',  drift1 + 'px');
    el.style.setProperty('--drift2', drift2 + 'px');
    el.style.setProperty('--spin',   spin1 + 'deg');
    el.style.setProperty('--spin2',  spin2 + 'deg');
    el.style.setProperty('--popacity', opacity);
    el.style.animationDuration = duration + 's';
    el.style.animationDelay = delay + 's';
    el.style.transform = `scale(${size})`;

    const svg = createSVGFlower(color);
    el.appendChild(svg);
    canvas.appendChild(el);
    flowerCount++;

    const totalTime = (duration + delay) * 1000 + 200;
    setTimeout(()=>{
      el.remove();
      flowerCount--;
    }, totalTime);
  }

  // Called after loading screen is gone
  function start() {
    if (_started) return;
    _started = true;

    // Burst of initial spawns spread over first 3 seconds
    for(let i = 0; i < 18; i++){
      setTimeout(spawnLeaf,   i * 12);
    }
    for(let i = 0; i < 8; i++){
      setTimeout(spawnFlower, 100 + i * 150);
    }

    // Continuous spawn
    _leafInterval   = setInterval(spawnLeaf,   SPAWN_INTERVAL);
    _flowerInterval = setInterval(spawnFlower, FLOWER_SPAWN_INTERVAL);
  }

  return {
    start
  };
})();


/* ── PLAY COUNT TRACKING ── */
function getPlayCounts() {
  try { return JSON.parse(localStorage.getItem('jinka_play_counts') || '{}'); } catch(e) { return {}; }
}
function incrementPlayCount(idx) {
  const counts = getPlayCounts();
  counts[String(idx)] = (counts[String(idx)] || 0) + 1;
  localStorage.setItem('jinka_play_counts', JSON.stringify(counts));
}
function getTopPlayedIndices(n, exclude) {
  const counts = getPlayCounts();
  return Object.entries(counts)
    .sort((a, b) => b[1] - a[1])
    .map(([i]) => parseInt(i))
    .filter(i => i !== exclude && i >= 0)
    .slice(0, n);
}

/* ── NETWORK DETECTION ── */
function getNetworkTier() {
  const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
  if (!conn) return 'unknown';
  if (conn.saveData) return 'slow';
  const t = conn.effectiveType;
  if (t === 'slow-2g' || t === '2g') return 'slow';
  if (t === '3g') return 'medium';
  return 'fast';
}
function isSlowNetwork() {
  const t = getNetworkTier();
  return t === 'slow' || t === 'medium';
}

/* ── LOADING SCREEN ── */
let _lsPct = 0;

/* ── SMART AUDIO CACHE & PRELOADING ── */
const audioCache = {};
const PRELOAD_STATES = {
  IDLE: 'idle', PRELOADING: 'preloading', LOADED: 'loaded', PLAYING: 'playing', ERROR: 'error'
};
let preloadStates = {};

function setupAudioCache(trackIdx) {
  if (preloadStates[trackIdx] === undefined) preloadStates[trackIdx] = PRELOAD_STATES.IDLE;
  const slow = isSlowNetwork();
  const nextIdx = (trackIdx + 1) % TRACKS.length;
  // Always preload next track
  preloadSongInBackground(nextIdx);
  // Only preload prev + top-played on fast networks
  if (!slow) {
    const prevIdx = (trackIdx - 1 + TRACKS.length) % TRACKS.length;
    preloadSongInBackground(prevIdx);
    // Preload 2 most-played songs (not already queued)
    getTopPlayedIndices(3, trackIdx).forEach(i => preloadSongInBackground(i));
  }
}

function preloadSongInBackground(trackIdx) {
  if (audioCache[trackIdx] || preloadStates[trackIdx] === PRELOAD_STATES.PRELOADING) return;
  preloadStates[trackIdx] = PRELOAD_STATES.PRELOADING;
  updateQueueUI();

  const track = TRACKS[trackIdx];
  const audio = new Audio();
  audio.crossOrigin = 'anonymous';
  // Use metadata-only on slow networks to avoid hogging bandwidth
  audio.preload = isSlowNetwork() ? 'metadata' : 'auto';

  audio.addEventListener('canplay', () => {
    preloadStates[trackIdx] = PRELOAD_STATES.LOADED;
    audioCache[trackIdx] = audio;
    updateQueueUI();
  }, { once: true });
  audio.addEventListener('error', () => {
    preloadStates[trackIdx] = PRELOAD_STATES.ERROR;
    updateQueueUI();
  }, { once: true });

  audio.src = track.url;
  audio.load();
}

// Preload a single song and return a promise — used during init
function preloadSongPromise(trackIdx) {
  return new Promise(resolve => {
    if (audioCache[trackIdx]) { resolve(); return; }
    if (preloadStates[trackIdx] === PRELOAD_STATES.PRELOADING) {
      // Poll until done
      const t = setInterval(() => {
        if (audioCache[trackIdx] || preloadStates[trackIdx] === PRELOAD_STATES.ERROR) { clearInterval(t); resolve(); }
      }, 200);
      return;
    }
    preloadStates[trackIdx] = PRELOAD_STATES.PRELOADING;
    const track = TRACKS[trackIdx];
    const audio = new Audio();
    audio.crossOrigin = 'anonymous';
    audio.preload = 'auto';
    const done = () => { audioCache[trackIdx] = audio; preloadStates[trackIdx] = PRELOAD_STATES.LOADED; updateQueueUI(); resolve(); };
    audio.addEventListener('canplay',  done, { once: true });
    audio.addEventListener('error', () => { preloadStates[trackIdx] = PRELOAD_STATES.ERROR; updateQueueUI(); resolve(); }, { once: true });
    audio.src = track.url;
    audio.load();
    // Timeout safety — don't block forever on slow networks
    setTimeout(resolve, 12000);
  });
}

function getOrCreateAudio(trackIdx) {
  if (audioCache[trackIdx]) return audioCache[trackIdx];
  const track = TRACKS[trackIdx];
  const audio = new Audio();
  audio.crossOrigin = 'anonymous';
  audio.preload = 'auto';
  audio.src = track.url;
  return audio;
}

function clearOldCache(keepIndices) {
  Object.keys(audioCache).forEach(idx => {
    if (!keepIndices.includes(parseInt(idx))) {
      try { audioCache[idx].pause(); audioCache[idx].src = ''; } catch(e) {}
      delete audioCache[idx];
    }
  });
}

function updateQueueUI() {
  const rows = document.querySelectorAll('.track-row');
  rows.forEach((row, idx) => {
    const state = preloadStates[idx];
    if (state === PRELOAD_STATES.PRELOADING) { row.classList.add('preloading'); row.classList.remove('preloaded'); }
    else if (state === PRELOAD_STATES.LOADED) { row.classList.add('preloaded'); row.classList.remove('preloading'); }
    else { row.classList.remove('preloading', 'preloaded'); }
  });
}

/* ── TRACKS ── */
let TRACKS = [];

async function initApp() {
  const GITHUB_JSON_URL = 'https://raw.githubusercontent.com/Muntasir-UwU/Jinkii/6574ba8d80c7e510a9335d500ee457076f939561/api.json';
  setLoadProgress(5, 'Connecting to playlist…');

  try {
    const response = await fetch(GITHUB_JSON_URL);
    if (!response.ok) throw new Error('Network response was not ok');
    TRACKS = await response.json();
    setLoadProgress(30, 'Playlist loaded ✓');
  } catch(error) {
    console.error('Failed to fetch tracks:', error);
    setLoadProgress(100, '');
    hideLoadingScreen();
    document.getElementById('song-title').textContent = 'Error loading playlist';
    return;
  }

  const savedIdx   = parseInt(localStorage.getItem('jinka_last_track') || '0', 10);
  const startIdx   = (savedIdx >= 0 && savedIdx < TRACKS.length) ? savedIdx : 0;
  const topPlayed  = getTopPlayedIndices(3, startIdx);
  const slow       = isSlowNetwork();

  // Priority queue: last played first, then top 3 most played (skip on very slow)
  const priorityList = [startIdx, ...topPlayed].filter((v, i, a) => a.indexOf(v) === i);
  const toPreload    = slow ? [startIdx] : priorityList;
  const total        = toPreload.length;

  if (total > 0) {
    setLoadProgress(35, slow ? 'Slow network detected, loading essentials…' : 'Preloading your favorites…');
    for (let i = 0; i < toPreload.length; i++) {
      const idx = toPreload[i];
      const t   = TRACKS[idx];
      const pct = 35 + ((i + 1) / total) * 52;
      setLoadProgress(pct, `Loading "${t.title}"…`);
      await preloadSongPromise(idx);
    }
  }

  setLoadProgress(90, 'Setting up player…');
  loadTrack(startIdx, false);
  renderQueue();
  setupAudioCache(startIdx);

  setLoadProgress(98, '');
  hideLoadingScreen();
}

function isAcceptableLettered(text) {
  if (!text || typeof text !== 'string') return false;
  const cleaned = text.replace(/\[\d{2}:\d{2}([.:]\\d{1,3})?\]/g, '').trim();
  if (!cleaned) return true;

  const latinChars  = (cleaned.match(/[a-zA-Z\u00C0-\u024F]/g) || []).length;
  const banglaChars = (cleaned.match(/[\u0980-\u09FF]/g) || []).length;
  const acceptedChars = latinChars + banglaChars;

  const rejectedChars = (cleaned.match(/[\u0900-\u097F\u0A00-\u0A7F\u0A80-\u0AFF\u0B00-\u0B7F\u0B80-\u0BFF\u0C00-\u0C7F\u0C80-\u0CFF\u0D00-\u0D7F\u0600-\u06FF\u0750-\u077F\u4E00-\u9FFF\u3040-\u309F\u30A0-\u30FF\uAC00-\uD7AF\u0400-\u04FF\u0500-\u052F\u0E00-\u0E7F\u1000-\u109F]/g) || []).length;

  if (rejectedChars > 0) return false;

  const totalAlpha = acceptedChars + rejectedChars;
  if (totalAlpha === 0) return true;

  return acceptedChars / totalAlpha > 0.7;
}

function isLyricsAcceptable(lyricsText) {
  if (!lyricsText) return false;
  const lines = lyricsText.split('\n').filter(l => {
    const cleaned = l.replace(/\[\d{2}:\d{2}([.:]\\d{1,3})?\]/g, '').trim();
    return cleaned.length > 0;
  });
  if (lines.length === 0) return true;
  const goodLines = lines.filter(l => isAcceptableLettered(l)).length;
  return (goodLines / lines.length) >= 0.8;
}

/* ── WAVEFORM ── */
const BAR_COUNT = 52;
const waveBox = document.getElementById('wave-box');

function buildWave(seed) {
  waveBox.innerHTML = '';
  for (let i = 0; i < BAR_COUNT; i++) {
    const h = 12 + (Math.abs(Math.sin(seed * 9.1 + i * 0.43 + Math.cos(i * 0.27 + seed))) * 88);
    const bar = document.createElement('div');
    bar.className = 'wb';
    bar.style.height = h + '%';
    bar.dataset.i = i;
    bar.addEventListener('click', () => {
      if (aud.duration) aud.currentTime = (i / BAR_COUNT) * aud.duration;
    });
    waveBox.appendChild(bar);
  }
}

function updateWave() {
  if (!aud.duration) return;
  const pct = aud.currentTime / aud.duration;
  const headIdx = Math.round(pct * (BAR_COUNT - 1));
  waveBox.querySelectorAll('.wb').forEach((b, i) => {
    b.classList.toggle('played', i < headIdx);
    b.classList.toggle('head',   i === headIdx);
    if (i !== headIdx) b.classList.remove('played', 'head');
    if (i < headIdx) b.classList.add('played');
    if (i === headIdx) b.classList.add('head');
  });
}

  document.getElementById('sp1').style.background    = t.color;
  document.documentElement.style.setProperty('--accent', t.color);

  document.getElementById('like-btn').classList.toggle('on', liked.has(cur));

/* ── MEDIA SESSION API ── */
function updateMediaSession(t) {
  if (!('mediaSession' in navigator)) return;

  navigator.mediaSession.metadata = new MediaMetadata({
    title:  t.title,
    artist: `Billi - ${t.artist}`,
    album: 'Jinka Player',
    artwork: [
      { src: t.thumb, sizes: '512x512', type: 'image/jpeg' },
      { src: t.thumb, sizes: '256x256', type: 'image/jpeg' },
    ]
  });

  navigator.mediaSession.setActionHandler('play', () => {
    aud.play().catch(() => {});
  });
  navigator.mediaSession.setActionHandler('pause', () => {
    aud.pause();
  });
  navigator.mediaSession.setActionHandler('previoustrack', () => {
    prevTrack();
  });
  navigator.mediaSession.setActionHandler('nexttrack', () => {
    nextTrack();
  });
  navigator.mediaSession.setActionHandler('seekto', (details) => {
    if (details.seekTime !== undefined && aud.duration) {
      aud.currentTime = details.seekTime;
    }
  });
  navigator.mediaSession.setActionHandler('seekbackward', (details) => {
    aud.currentTime = Math.max(0, aud.currentTime - (details.seekOffset || 10));
  });
  navigator.mediaSession.setActionHandler('seekforward', (details) => {
    aud.currentTime = Math.min(aud.duration || 0, aud.currentTime + (details.seekOffset || 10));
  });
}

function updatePositionState() {
  if (!('mediaSession' in navigator) || !aud.duration) return;
  try {
    navigator.mediaSession.setPositionState({
      duration:     aud.duration,
      playbackRate: aud.playbackRate,
      position:     aud.currentTime,
    });
  } catch(e) { }
}

/* ════════════════════════════════════════
   LRC PARSER
════════════════════════════════════════ */
function parseLyric(lrc) {
  const regex = /^\[(?<time>\d{2}:\d{2}(\.\d{1,3})?)\](?<text>.*)/;
  const lines  = lrc.split('\n');
  const output = [];

  lines.forEach(line => {
    const match = line.match(regex);
    if (!match) return;
    const { time, text } = match.groups;
    const trimmed = text.trim();
    output.push({ time: parseTime(time), text: trimmed });
  });

  function parseTime(t) {
    const [min, sec] = t.split(':');
    return parseInt(min) * 60 + parseFloat(sec);
  }

  return output;
}

/* ── SYNCER ── */
function syncLyric(lyrics, time) {
  const scores = [];
  lyrics.forEach(lyric => {
    const score = time - lyric.time;
    if (score >= 0) scores.push(score);
  });
  if (!scores.length) return null;
  return scores.indexOf(Math.min(...scores));
}

/* ── UPDATE SYNCED LYRICS on timeupdate ── */
function updateSyncedLyrics() {
  if (!lyricsOpen || !parsedLyrics.length) return;
  const idx = syncLyric(parsedLyrics, aud.currentTime);
  if (idx === null || idx === activeIdx) return;
  activeIdx = idx;

  const body  = document.getElementById('lyr-body');
  const lines = body.querySelectorAll('.lrc-display p');
  lines.forEach((el, i) => {
    el.classList.toggle('active', i === idx);
    el.classList.toggle('before', i < idx);
  });

  const active = lines[idx];
  if (active) {
    const bodyRect   = body.getBoundingClientRect();
    const lineRect   = active.getBoundingClientRect();
    const offset     = lineRect.top - bodyRect.top - bodyRect.height / 2 + lineRect.height / 2;
    body.scrollBy({ top: offset, behavior: 'smooth' });
  }
}

/* ════════════════════════════════════════
   LYRICS FETCHER — lrclib.net
════════════════════════════════════════ */
async function fetchLyrics(trackIdx, audioDuration) {
  if (lyricsCache[trackIdx] !== undefined) return;
  lyricsCache[trackIdx] = null;

  const t = TRACKS[trackIdx];

  async function tryGet(url) {
    const r = await fetch(url);
    if (!r.ok) throw new Error(r.status);
    return r.json();
  }

  const DURATION_TOLERANCE = 15;

  function scoreResult(r, dur) {
    const hasSynced = r.syncedLyrics && isLyricsAcceptable(r.syncedLyrics);
    const hasPlain  = r.plainLyrics  && isLyricsAcceptable(r.plainLyrics);

    if (!hasSynced && !hasPlain) return null;

    let score = 0;
    if (dur && r.duration) {
      score += Math.abs(r.duration - dur);
    }
    if (hasSynced) score -= 5;

    return { result: r, score, hasSynced, hasPlain };
  }

  function pickBestAcceptable(results, dur) {
    if (!Array.isArray(results) || !results.length) return null;

    const scored = results
      .map(r => scoreResult(r, dur))
      .filter(s => s !== null);

    if (!scored.length) return null;

    scored.sort((a, b) => a.score - b.score);
    return scored[0];
  }

  try {
    let bestPick = null;

    try {
      const qGet = new URLSearchParams({ track_name: t.title, artist_name: t.artist });
      if (t.album)       qGet.append('album_name', t.album);
      if (audioDuration) qGet.append('duration', Math.round(audioDuration));

      const data = await tryGet(`https://lrclib.net/api/get?${qGet}`);

      if (data) {
        const durOk = !audioDuration || !data.duration ||
                      Math.abs(data.duration - audioDuration) <= DURATION_TOLERANCE;

        if (durOk) {
          const s = scoreResult(data, audioDuration);
          if (s) bestPick = s;
        }
      }
    } catch(e) { }

    try {
      const qSearch = new URLSearchParams({ q: `${t.title} ${t.artist}` });
      const results = await tryGet(`https://lrclib.net/api/search?${qSearch}`);

      if (Array.isArray(results) && results.length) {
        const searchPick = pickBestAcceptable(results, audioDuration);

        if (searchPick) {
          if (!bestPick || searchPick.score < bestPick.score) {
            bestPick = searchPick;
          }
        }
      }
    } catch(e) { }

    if (!bestPick) {
      try {
        const qBroad = new URLSearchParams({ q: t.title });
        const results2 = await tryGet(`https://lrclib.net/api/search?${qBroad}`);

        if (Array.isArray(results2) && results2.length) {
          const broadPick = pickBestAcceptable(results2, audioDuration);
          if (broadPick) bestPick = broadPick;
        }
      } catch(e) { }
    }

    if (!bestPick) {
      try {
        const qRoman = new URLSearchParams({ q: `${t.title} romanized` });
        const results3 = await tryGet(`https://lrclib.net/api/search?${qRoman}`);

        if (Array.isArray(results3) && results3.length) {
          const romanPick = pickBestAcceptable(results3, audioDuration);
          if (romanPick) bestPick = romanPick;
        }
      } catch(e) { }
    }

    if (bestPick) {
      if (bestPick.hasSynced) {
        lyricsCache[trackIdx] = { type: 'lrc', content: bestPick.result.syncedLyrics };
      } else if (bestPick.hasPlain) {
        lyricsCache[trackIdx] = { type: 'plain', content: bestPick.result.plainLyrics };
      } else {
        lyricsCache[trackIdx] = { type: 'none' };
      }
    } else {
      lyricsCache[trackIdx] = { type: 'none' };
    }
  } catch(e) {
    lyricsCache[trackIdx] = { type: 'none' };
  }

  if (lyricsOpen && trackIdx === cur) renderLyricsPanel();
}

/* ── LYRICS PANEL RENDER ── */
function renderLyricsPanel() {
  const body   = document.getElementById('lyr-body');
  const status = document.getElementById('lyr-status');

  parsedLyrics = [];
  activeIdx    = -1;
  body.innerHTML = '';

  const cached = lyricsCache[cur];

  if (cached === null || cached === undefined) {
    status.textContent = '⟳ Fetching lyrics…';
    status.className   = 'lyr-status loading';
    return;
  }

  if (cached.type === 'none') {
    status.textContent = '✗ No acceptable lyrics found';
    status.className   = 'lyr-status error';
    body.innerHTML = `
      <div class="no-lyrics">
        <span class="nl-icon">🎵</span>
        <span class="nl-txt">No English or Bangla lyrics available for this track.</span>
      </div>`;
    return;
  }

  if (cached.type === 'lrc') {
    status.textContent = '✓ Synced lyrics · lrclib.net';
    status.className   = 'lyr-status ok';

    parsedLyrics = parseLyric(cached.content);

    const wrap = document.createElement('div');
    wrap.className = 'lrc-display';

    parsedLyrics.forEach(({ text }) => {
      const p = document.createElement('p');
      p.textContent = text;
      wrap.appendChild(p);
    });

    body.appendChild(wrap);

    activeIdx = -1;
    updateSyncedLyrics();
    return;
  }

  if (cached.type === 'plain') {
    status.textContent = '✓ Lyrics · lrclib.net';
    status.className   = 'lyr-status ok';
    const div = document.createElement('div');
    div.className = 'plain-lyrics';
    div.innerHTML = cached.content
      .split('\n')
      .map(l => l.trim() === '' ? '<span class="blank"></span>' : `<p>${escHtml(l)}</p>`)
      .join('');
    body.appendChild(div);
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── OPEN / CLOSE LYRICS ── */
function openLyrics() {
  lyricsOpen = true;
  document.getElementById('lyrics-panel').classList.add('open');
  document.getElementById('lyr-btn').classList.add('on');
  renderLyricsPanel();

  if (lyricsCache[cur] === null) {
    const poll = setInterval(() => {
      if (lyricsCache[cur] !== null) {
        clearInterval(poll);
        if (lyricsOpen) renderLyricsPanel();
      }
    }, 350);
  }
}

function closeLyrics() {
  lyricsOpen = false;
  document.getElementById('lyrics-panel').classList.remove('open');
  document.getElementById('lyr-btn').classList.remove('on');
}

let _ty0 = 0;
document.getElementById('lyrics-panel').addEventListener('touchstart', e => { _ty0 = e.touches[0].clientY; }, { passive: true });
document.getElementById('lyrics-panel').addEventListener('touchend',   e => { if (e.changedTouches[0].clientY - _ty0 > 80) closeLyrics(); }, { passive: true });

function updateNotifCard() {
  const t = TRACKS[cur];
  
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification(`Billi`, {
      body: `${t.title}\nBilli`,
      icon: t.thumb,
      tag: 'billi-music',
      requireInteraction: false,
      badge: t.thumb
    });
  }
}

/* ── REPEAT TOGGLE ── */
function toggleRepeat() {
  repeatMode = (repeatMode + 1) % 3;
  const btn = document.getElementById('repeat-btn');
  btn.classList.toggle('on', repeatMode > 0);
  
  if (repeatMode === 2) {
    btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4zm-4-2V9h-1l-2 1v1h1.5v4H13z"/></svg><div class="load-ring"></div>';
  } else {
    btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg><div class="load-ring"></div>';
  }
}

/* ── CONSOLIDATED ENDED EVENT ── */
aud.onended = () => {
  setupAudioCache(cur);
  
  if (repeatMode === 2) {
    aud.currentTime = 0;
    aud.play().catch(() => {});
  } else if (repeatMode === 1) {
    nextTrack(true); 
  } else {
    if (isShuffle || cur < TRACKS.length - 1) {
      nextTrack(true); 
    } else {
      setPlaying(false);
    }
  }
};

const EYE_INTERVAL_MS = 4000;
let _eyeIdx     = 0;
let _eyeTimer   = null;
let _lbOpen     = false;
let _lbIdx      = 0;

function initEyePic() {
  const wrap = document.getElementById('eye-pic-wrap');
  if (!EYE_PICS.length) { wrap.style.display = 'none'; return; }


  // Strip
  const strip = document.createElement('div');
  strip.className = 'eye-pic-strip';
  strip.id = 'eye-strip';
  wrap.appendChild(strip);

  EYE_PICS.forEach((pic, i) => {
    const card = document.createElement('div');
    card.className = 'eye-card' + (i === 0 ? ' active-card' : '');
    card.style.backgroundImage = `url(${pic.src})`;
    card.dataset.idx = i;

    card.addEventListener('click', () => openLightbox(i));
    strip.appendChild(card);
  });

  // Dots
  if (EYE_PICS.length > 1) {
    const dots = document.createElement('div');
    dots.className = 'eye-pic-dots';
    dots.id = 'eye-dots';
    EYE_PICS.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'eye-dot' + (i === 0 ? ' on' : '');
      dots.appendChild(d);
    });
    wrap.appendChild(dots);

    // Auto cycle
    _eyeTimer = setInterval(() => _eyeAdvance(), EYE_INTERVAL_MS);
  }
}

function _eyeSetActive(idx) {
  _eyeIdx = idx;
  const strip = document.getElementById('eye-strip');
  const cards = strip ? strip.querySelectorAll('.eye-card') : [];
  cards.forEach((c, i) => c.classList.toggle('active-card', i === idx));

  const dots = document.getElementById('eye-dots');
  if (dots) {
    dots.querySelectorAll('.eye-dot').forEach((d, i) => d.classList.toggle('on', i === idx));
  }

  // Scroll card into view gently
  if (cards[idx]) {
    cards[idx].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }
}

function _eyeAdvance() {
  _eyeSetActive((_eyeIdx + 1) % EYE_PICS.length);
}

/* ── LIGHTBOX ── */
function openLightbox(idx) {
  _lbOpen = true;
  _lbIdx  = idx;
  _renderLightbox();
  document.getElementById('eye-lightbox').classList.add('open');
  if (_eyeTimer) clearInterval(_eyeTimer);
}

function closeLightbox() {
  _lbOpen = false;
  document.getElementById('eye-lightbox').classList.remove('open');
  // Resume slideshow
  if (EYE_PICS.length > 1) _eyeTimer = setInterval(() => _eyeAdvance(), EYE_INTERVAL_MS);
}

function lbPrev() {
  _lbIdx = (_lbIdx - 1 + EYE_PICS.length) % EYE_PICS.length;
  _renderLightbox(true);
}
function lbNext() {
  _lbIdx = (_lbIdx + 1) % EYE_PICS.length;
  _renderLightbox(true);
}

function _renderLightbox(animate) {
  const pic    = EYE_PICS[_lbIdx];
  const img    = document.getElementById('lb-img');
  const cap    = document.getElementById('lb-cap-main');
  const sub    = document.getElementById('lb-cap-sub');
  const ctr    = document.getElementById('lb-counter');
  const inner  = document.querySelector('.lb-inner');

  if (animate && inner) {
    inner.style.transition = 'none';
    inner.style.opacity = '0';
    inner.style.transform = 'scale(.92) translateY(12px)';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      inner.style.transition = '';
      inner.style.opacity = '';
      inner.style.transform = '';
    }));
  }

  img.src          = pic.src;
  cap.textContent  = pic.caption;
  sub.textContent  = pic.sub || '';
  ctr.textContent  = `${_lbIdx + 1} / ${EYE_PICS.length}`;
  _eyeSetActive(_lbIdx);
}

// Swipe to close lightbox
let _lbTy0 = 0;
document.getElementById('eye-lightbox').addEventListener('touchstart', e => { _lbTy0 = e.touches[0].clientY; }, { passive:true });
document.getElementById('eye-lightbox').addEventListener('touchend',   e => {
  const dy = e.changedTouches[0].clientY - _lbTy0;
  const dx = Math.abs(e.changedTouches[0].clientX - (e.changedTouches[0].target?.getBoundingClientRect?.()?.left ?? 0));
  if (dy > 70) closeLightbox();
}, { passive:true });
// Tap backdrop to close
document.getElementById('eye-lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('eye-lightbox')) closeLightbox();
});

function updateEyePicColor(color) {
  const wrap = document.getElementById('eye-pic-wrap');
  if (!wrap || !EYE_PICS.length) return;
  wrap.style.borderColor = color + '55';
  wrap.style.boxShadow   = `0 8px 32px ${color}22, inset 0 1px 0 rgba(255,255,255,0.07)`;
  // update dot active color via CSS var
  document.documentElement.style.setProperty('--accent', color);
}
